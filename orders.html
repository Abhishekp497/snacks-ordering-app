<!DOCTYPE html>
<html>
<head>
<title>Kitchen Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
}

.order {
    background: white;
    padding: 15px;
    margin: 15px;
    border-radius: 8px;
    box-shadow: 0 0 5px gray;
}

button {
    margin: 5px;
    padding: 8px 12px;
}
</style>

</head>

<body>

<h1>👨‍🍳 Live Orders Dashboard</h1>

<div id="orders"></div>

<script>

function loadOrders() {

    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    let container = document.getElementById("orders");

    container.innerHTML = "";

    orders.forEach((order, index) => {

        let div = document.createElement("div");
        div.className = "order";

        let itemsText = order.items
            .map(item => item.name + " ₹" + item.price)
            .join(", ");

        div.innerHTML =
            "<h3>👤 " + order.customerName + "</h3>" +
            "<p>📱 " + order.phone + "</p>" +
            "<p>🍔 " + itemsText + "</p>" +
            "<p>💰 Total: ₹" + order.total + "</p>" +
            "<p>💳 Payment: " + order.payment + "</p>" +
            "<p>📌 Status: " + order.status + "</p>" +

            "<button onclick='updateStatus(" + index + ", \"Preparing\")'>🍳 Preparing</button>" +
            "<button onclick='updateStatus(" + index + ", \"Ready\")'>✅ Ready</button>" +
            "<button onclick='updateStatus(" + index + ", \"Completed\")'>✔️ Completed</button>";

        container.appendChild(div);
    });
}

function updateStatus(index, newStatus) {

    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    orders[index].status = newStatus;

    localStorage.setItem("orders", JSON.stringify(orders));

    loadOrders();
}

loadOrders();

</script>

</body>

</html>
